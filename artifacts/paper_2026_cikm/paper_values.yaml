setup:
  topics:
    - "Immigration"
    - "Gun Control and Gun Rights"
    - "Economy and Jobs"
    - "Abortion"
    - "Free Speech"
    - "Voting Rights and Voter Fraud"
    - "Climate Change"
  queries_per_topic: 30
  total_queries: 210
  retrieval_top_k: 10
  candidate_pool: 50
  embedding_model: "text-embedding-3-small"
  generator_model: "gpt-4o"
  primary_judge: "gpt-4o"
  robustness_judge: "claude-sonnet-4-6"
  generation_temperature: 0
  retrieval_alpha: 0.7
  retrieval_beta: 0.3

